name: food_delivery_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # UI & Animations
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - images/tacos.jpg
    - images/peperoni.jpeg
    - images/pizza-Quatre-fromages.webp
    - images/pizza-Margarita.webp
    - images/pizza-quatre-saisons.jpg
    - images/pizza-aux-fruits-de-mer.jpg
    - images/tacos-de-poulet.jpeg
    - images/tacos-viande-hachee.webp
    - images/tacos-mixte.webp
    - images/salade aubergine.jpeg
    - images/concombre tomate.jpeg
    - images/carrote.jpg
    - images/pomme de terre.jpeg
    - images/ice-tea.webp
    - images/jus-orange.webp
    - images/eau-minerale.jpg
    - images/sprite.jpg
    - images/fanta.jpg
    - images/coca-zero.jpg
    - images/coca-cola.jpg

flutter_icons:
  android: true
  ios: true
  image_path: "images/logoo.jpg"
